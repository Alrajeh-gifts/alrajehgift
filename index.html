<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>فحص الاتصال النهائي</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
    body { background: #000; color: #0f0; font-family: monospace; padding: 20px; text-align: center; }
    #log { text-align: left; background: #111; padding: 15px; border: 1px solid #333; margin-top: 20px; height: 300px; overflow-y: auto; font-size: 12px; }
    button { padding: 20px; font-size: 20px; cursor: pointer; background: #0f0; color: #000; border: none; font-weight: bold; width: 100%; }
</style>
</head>
<body>

    <h2>فحص نظام القرعة الذكي 🛠️</h2>
    <button onclick="startFinalTest()">اضغط لتشغيل الفحص الآن</button>
    <div id="log">-- بانتظار بدء الفحص --</div>

<script>
// تأكد أن هذه الروابط مطابقة لمشروعك في Supabase
const SURL = 'https://oprethkloexyrhagmdod.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wcmV0aGtsb2V4eXJoYWdtZG9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTI1MjAsImV4cCI6MjA4ODM4ODUyMH0.crUKNWb8iWJHwe9mp59KcALS4LSuy0dqZn4xEsW04Gc';
const db = supabase.createClient(SURL, SKEY);

function logger(msg, color = "#0f0") {
    const l = document.getElementById('log');
    l.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
    l.scrollTop = l.scrollHeight;
}

async function startFinalTest() {
    logger("بدء الفحص الحقيقي...");
    
    try {
        // الخطوة 1: فحص الاتصال بجدول المستخدمين
        logger("1. محاولة جلب المستخدمين...");
        const { data: users, error: e1 } = await db.from('users').select('id, name');
        if (e1) throw new Error("فشل الاتصال بجدول users: " + e1.message);
        logger(`تم العثور على (${users.length}) مستخدمين.`);

        // الخطوة 2: فحص جدول القرعات
        logger("2. محاولة إنشاء سجل في جدول draws...");
        const { data: draw, error: e2 } = await db.from('draws').insert({ month_name: 'تجربة فحص' }).select().single();
        if (e2) throw new Error("فشل الكتابة في جدول draws: " + e2.message);
        logger("تم إنشاء سجل القرعة بنجاح.");

        // الخطوة 3: فحص جدول التوزيعات
        logger("3. محاولة كتابة توزيع تجريبي في assignments...");
        const { error: e3 } = await db.from('assignments').insert({
            draw_id: draw.id,
            giver_id: users[0].id,
            receiver_id: users[1].id
        });
        if (e3) throw new Error("فشل الكتابة في جدول assignments: " + e3.message);
        logger("تم حفظ التوزيع التجريبي بنجاح!");

        logger("🎉 النظام سليم 100% والآن يعمل!", "yellow");
        alert("اشتغلت! النظام الآن قادر على القراءة والكتابة.");

    } catch (err) {
        logger("❌ خطأ فادح: " + err.message, "red");
        console.error(err);
    }
}
</script>
</body>
</html>
