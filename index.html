<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هدايا العيد! 🎁</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>">
    <link rel="manifest" id="manifest-link">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* === الأساسيات وتنسيق Apple === */
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { min-height: 100%; margin: 0; padding: 0; }

        :root {
            --bg: #08090d;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.75);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --liquid-1: rgba(99, 102, 241, 0.4);
            --liquid-2: rgba(139, 92, 246, 0.35);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f2f4f8;
                --text-primary: #0f172a;
                --text-secondary: #334155;
                --glass-bg: rgba(255, 255, 255, 0.75);
                --glass-border: rgba(99, 102, 241, 0.2);
            }
            .btn-primary { color: #ffffff !important; }
        }

        body {
            background: var(--bg); color: var(--text-primary);
            display: flex; flex-direction: column; align-items: center;
            padding: 2rem 1rem; overflow-x: hidden;
            transition: background 0.5s ease;
        }

        /* السائل المتحرك خلف الزجاج */
        .liquid-blob { position: fixed; border-radius: 50%; filter: blur(85px); opacity: 0.6; z-index: 0; pointer-events: none; }
        .blob-1 { width: 550px; height: 550px; top: -150px; right: -150px; background: var(--liquid-1); animation: swim 20s infinite alternate; }
        .blob-2 { width: 450px; height: 450px; bottom: -100px; left: -100px; background: var(--liquid-2); animation: swim 16s infinite alternate-reverse; }
        @keyframes swim { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(60px, 50px) scale(1.1); } }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(35px) saturate(210%);
            -webkit-backdrop-filter: blur(35px) saturate(210%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.5);
            position: relative; overflow: hidden; z-index: 10;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: 1px solid rgba(255,255,255,0.15);
            border-bottom: 3px solid rgba(0,0,0,0.25);
            cursor: pointer; transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-primary:active { transform: scale(0.95); }

        .code-input {
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            color: var(--text-primary); text-align: center; font-weight: 700;
        }

        .fade-up { animation: fadeUp 0.7s ease-out forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .wish-active { background: var(--accent) !important; color: white !important; }
        
        #assignments-section, #member-screen, #admin-screen { width: 100%; max-width: 25rem; margin: auto; }
    </style>
</head>
<body>

<div class="liquid-blob blob-1"></div>
<div class="liquid-blob blob-2"></div>

<div id="login-screen" class="fade-up px-4 w-full max-w-sm">
    <div class="text-center mb-10">
        <div style="font-size:5.5rem; filter: drop-shadow(0 15px 25px rgba(99,102,241,0.3))">🎁</div>
        <h1 class="text-4xl font-black mt-4">هدايا العيد</h1>
        <p class="opacity-60 mt-2 font-bold">أدخل الرمز السري للانضمام</p>
    </div>
    <div class="glass rounded-[2.5rem] p-8 flex flex-col gap-6">
        <input type="password" id="access-code" placeholder="الرمز السري" class="code-input p-5 rounded-2xl text-3xl outline-none">
        <button onclick="login()" id="login-btn" class="btn-primary w-full font-black py-4 rounded-2xl text-xl">دخول ←</button>
    </div>
</div>

<div id="member-screen" class="fade-up px-4 w-full max-w-sm hidden" style="flex-direction:column; gap:1.5rem">
    <div class="glass rounded-[2.5rem] p-8 text-center mt-6">
        <p class="text-xs opacity-50 font-black mb-1">عضو في العائلة</p>
        <h2 id="user-welcome" class="text-2xl font-black mb-8"></h2>

        <div id="result-card" class="p-6 rounded-[2rem] border border-indigo-500/20 bg-indigo-500/5 hidden">
            <p class="text-xs opacity-60 font-black mb-2 uppercase">🎯 هديتك ستكون لـ</p>
            <div id="target-name" class="text-5xl font-black text-indigo-500 mb-8 tracking-tighter"></div>
            
            <div id="budget-display" class="p-4 rounded-2xl mb-8 flex items-center justify-center gap-2 border border-indigo-500/10 hidden">
                <span class="text-xs font-black opacity-60">💰 الميزانية:</span>
                <span id="budget-amount" class="font-black text-base text-indigo-600"></span>
            </div>

            <button onclick="toggleWishes()" class="bg-indigo-500/10 border border-indigo-500/20 px-8 py-3 rounded-full text-xs font-black mb-6">🎁 عرض رغباته</button>
            <div id="wishes-box" class="hidden flex-wrap justify-center gap-2 mb-6"></div>

            <div class="pt-8 border-t border-white/5 mt-2">
                <div style="background:rgba(99,102,241,0.1); padding:1rem; border-radius:1.5rem; margin-bottom:1rem; display:flex; align-items:center; justify-content:center; gap:0.5rem">
                    <span>⏳</span>
                    <span id="countdown-timer" class="text-sm font-black opacity-80">...</span>
                </div>
                <button id="deliver-btn" onclick="markAsDelivered()" class="btn-primary w-full py-4 rounded-2xl font-black text-sm">📦 تأكيد تسليم الهدية</button>
                <div id="delivered-msg" class="hidden bg-green-500/10 text-green-500 p-5 rounded-2xl font-black">✅ تم التسليم بنجاح!</div>
            </div>
        </div>
        
        <div id="no-draw-msg" class="hidden py-16 opacity-40 font-black text-lg">لم تُجرَ القرعة بعد 🔔</div>
    </div>

    <div class="glass rounded-[2.5rem] p-7">
        <h3 class="font-black text-xl mb-4 text-right">🌟 رغباتي</h3>
        <div id="wishes-grid" class="grid grid-cols-2 gap-3 mb-6"></div>
        <input type="text" id="custom-wish-input" placeholder="أو اكتب هديتك هنا..." class="code-input w-full p-4 rounded-2xl text-sm outline-none mb-6">
        <button onclick="saveWishes()" id="save-wishes-btn" class="w-full py-4 rounded-2xl font-black text-sm border border-indigo-500/30 bg-indigo-500/5">💾 حفظ اختياراتي</button>
    </div>

    <button onclick="logout()" class="font-black text-sm py-6 mb-10 opacity-30 hover:opacity-100 transition-opacity">← تسجيل خروج</button>
</div>

<div id="admin-screen" class="fade-up px-4 w-full max-w-sm hidden" style="flex-direction:column; gap:1.5rem">
    <div class="glass rounded-[2.5rem] p-8 mt-6 text-center">
        <h2 class="text-xl font-black mb-8">لوحة المشرف 👑</h2>
        <div class="text-right mb-8">
             <label class="text-xs font-black opacity-50 block mb-3 uppercase">💰 الميزانية</label>
             <input type="text" id="budget-input" placeholder="مثلاً: 300 ريال" class="code-input w-full p-5 rounded-2xl text-base outline-none">
        </div>
        <button onclick="runDraw()" id="draw-btn" class="btn-primary w-full py-5 rounded-2xl font-black text-xl">🎲 إجراء قرعة جديدة</button>
    </div>
    <div id="assignments-section" class="hidden">
        <div class="glass rounded-[2.5rem] p-6"><div id="assignments-list" class="flex flex-col gap-3"></div></div>
    </div>
    <button onclick="logout()" class="opacity-30 font-black text-sm py-8 text-center">← تسجيل خروج</button>
</div>

<canvas id="confetti-canvas" style="position:fixed; inset:0; pointer-events:none; z-index:999; display:none"></canvas>

<script>
    // --- إعدادات DATABASE ---
    const SUPABASE_URL = 'https://oprethkloexyrhagmdod.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wcmV0aGtsb2V4eXJoYWdtZG9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTI1MjAsImV4cCI6MjA4ODM4ODUyMH0.crUKNWb8iWJHwe9mp59KcALS4LSuy0dqZn4xEsW04Gc';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentAssignmentId = null;
    let receiverWishesData = [];

    // --- نظام الجلسة والحماية من الخروج ---
    window.onload = async () => {
        const savedCode = localStorage.getItem('userCode');
        if (savedCode) {
            document.getElementById('access-code').value = savedCode;
            login(true); // دخول تلقائي صامت
        }
    };

    function haptic(pattern) {
        if ("vibrate" in navigator) navigator.vibrate(pattern);
    }

    async function login(isAuto = false) {
        if (!isAuto) haptic(70);
        const btn = document.getElementById('login-btn');
        const codeInput = document.getElementById('access-code');
        const code = codeInput.value.trim();
        
        if (!code) return;
        if (!isAuto) btn.innerText = 'جاري التحقق...';

        const { data: user, error } = await db.from('users').select('*').eq('code', code).single();

        if (error || !user) {
            if (!isAuto) alert('الرمز غير صحيح!');
            localStorage.removeItem('userCode');
            btn.innerText = 'دخول ←';
            return;
        }

        // حفظ الجلسة
        localStorage.setItem('userCode', code);
        currentUser = user;
        user.role === 'admin' ? showAdminScreen() : showMemberScreen(user);
    }

    function logout() {
        localStorage.removeItem('userCode');
        location.reload();
    }

    // --- شاشة العضو ---
    async function showMemberScreen(user) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('member-screen').classList.remove('hidden');
        document.getElementById('member-screen').style.display = 'flex';
        document.getElementById('user-welcome').innerText = user.name;

        buildWishesGrid(user.wishes || '');

        // جلب آخر قرعة لضمان ثبات الاسم
        const { data: drawData } = await db.from('draws').select('*').order('created_at', {ascending: false}).limit(1).maybeSingle();
        
        if (drawData) {
            if (drawData.budget) {
                document.getElementById('budget-amount').innerText = drawData.budget;
                document.getElementById('budget-display').classList.remove('hidden');
                document.getElementById('budget-display').style.display = 'flex';
            }

            const { data: assign } = await db.from('assignments').select('*, receiver:users!receiver_id(name, wishes)')
                .eq('giver_id', user.id).eq('draw_id', drawData.id).maybeSingle();

            if (assign) {
                currentAssignmentId = assign.id;
                document.getElementById('target-name').innerText = assign.receiver.name;
                haptic([100, 50, 100]); 
                
                if (assign.is_delivered) {
                    document.getElementById('delivered-msg').classList.remove('hidden');
                    document.getElementById('deliver-btn').classList.add('hidden');
                } else {
                    document.getElementById('deliver-btn').classList.remove('hidden');
                }
                document.getElementById('result-card').style.display = 'block';
                receiverWishesData = (assign.receiver.wishes || '').split(',').filter(Boolean);
            } else {
                document.getElementById('no-draw-msg').classList.remove('hidden');
            }
        } else {
            document.getElementById('no-draw-msg').classList.remove('hidden');
        }
    }

    // --- تسليم الهدية (بدون خروج!) ---
    async function markAsDelivered() {
        if(!confirm('تأكيد تسليم الهدية؟ 🎁')) return;
        haptic([60, 40, 60]);
        const { error } = await db.from('assignments').update({ is_delivered: true }).eq('id', currentAssignmentId);
        if(!error) {
            fireConfetti();
            document.getElementById('deliver-btn').classList.add('hidden');
            document.getElementById('delivered-msg').classList.remove('hidden');
        }
    }

    // --- العد التنازلي والميزات الأخرى ---
    function initCountdown() {
        const eidDate = new Date("2026-03-20T00:00:00").getTime();
        setInterval(() => {
            const diff = eidDate - new Date().getTime();
            const timerEl = document.getElementById('countdown-timer');
            if (diff < 0) { timerEl.innerText = "عيدكم مبارك! 🎉"; return; }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            timerEl.innerText = `باقي للعيد: ${d} يوم و ${h} ساعة`;
        }, 1000);
    }
    initCountdown();

    function buildWishesGrid(saved) {
        const options = ['عطور وعناية', 'ملابس وأناقة', 'إلكترونيات', 'قهوة وحلويات', 'ساعة فخمة', 'كتب وقراءة'];
        const grid = document.getElementById('wishes-grid');
        const savedArray = (saved || '').split(',');
        grid.innerHTML = options.map(opt => `<button onclick="this.classList.toggle('wish-active'); haptic(20);" class="wish-chip p-4 rounded-2xl font-bold text-[10px] ${savedArray.includes(opt) ? 'wish-active' : 'opacity-60'}">${opt}</button>`).join('');
    }

    async function saveWishes() {
        const selected = [...document.querySelectorAll('.wish-active')].map(b => b.innerText);
        const custom = document.getElementById('custom-wish-input').value.trim();
        if (custom) selected.push(custom);
        await db.from('users').update({ wishes: selected.join(',') }).eq('id', currentUser.id);
        alert('تم الحفظ! ✅');
    }

    function toggleWishes() {
        const box = document.getElementById('wishes-box');
        box.classList.toggle('hidden'); box.classList.add('flex');
        box.innerHTML = receiverWishesData.length ? receiverWishesData.map(w => `<span class="bg-indigo-500/15 p-2 rounded-xl text-[10px] font-bold text-indigo-400">${w}</span>`).join('') : '<p class="text-xs opacity-50">لا يوجد رغبات محددة</p>';
    }

    async function showAdminScreen() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin-screen').classList.remove('hidden');
        document.getElementById('admin-screen').style.display = 'flex';
        const { data: assigns } = await db.from('assignments').select('*, giver:users!giver_id(name), receiver:users!receiver_id(name)');
        if (assigns && assigns.length > 0) {
            document.getElementById('assignments-section').classList.remove('hidden');
            document.getElementById('assignments-list').innerHTML = assigns.map(a => `<div style="background:rgba(255,255,255,0.03); padding:1rem; border-radius:1rem; display:flex; justify-content:space-between"><span>${a.giver.name}</span><span class="opacity-20">←</span><span>${a.receiver.name}</span></div>`).join('');
        }
    }

    async function runDraw() {
        if(!confirm('سيتم إنشاء قرعة جديدة، هل أنت متأكد؟')) return;
        const { data: members } = await db.from('users').select('*').eq('role', 'member');
        let shuffled = null;
        for (let i = 0; i < 10000; i++) {
            const temp = [...members].sort(() => Math.random() - 0.5);
            if (!temp.some((m, idx) => m.id === members[idx].id)) {
                const map = {}; members.forEach((m, idx) => map[m.name] = temp[idx].name);
                if (map['فواز'] === 'نواف') continue;
                const giverOfS = Object.keys(map).find(k => map[k] === 'سميرة');
                if (!['طارق', 'فواز'].includes(giverOfS)) continue;
                shuffled = temp; break;
            }
        }
        if (!shuffled) return alert('فشل السحب');
        await db.from('assignments').delete().neq('id', 0);
        const { data: d } = await db.from('draws').insert({ month_name: 'العيد 2026', budget: document.getElementById('budget-input').value }).select().single();
        await db.from('assignments').insert(members.map((m, idx) => ({ draw_id: d.id, giver_id: m.id, receiver_id: shuffled[idx].id })));
        location.reload();
    }

    function fireConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        canvas.style.display = 'block';
        const colors = ['#6366f1','#a5b4fc','#ec4899','#ffffff'];
        const pieces = Array.from({length: 150}, () => ({
            x: Math.random() * canvas.width, y: -20, w: 10, h: 6,
            color: colors[Math.floor(Math.random() * colors.length)],
            vy: Math.random() * 5 + 2, vx: (Math.random() - 0.5) * 4, r: Math.random() * 360
        }));
        let frame = 0;
        (function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pieces.forEach(p => {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r * Math.PI/180);
                ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
                p.y += p.vy; p.x += p.vx;
            });
            if (++frame < 200) requestAnimationFrame(anim); else canvas.style.display = 'none';
        })();
    }

    const manifest = { "name": "هدايا العيد", "short_name": "هدايا", "start_url": ".", "display": "standalone", "background_color": "#08090d", "theme_color": "#6366f1", "icons": [{"src": "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>", "sizes": "192x192", "type": "image/svg+xml"}] };
    document.getElementById('manifest-link').href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
</script>

</body>
</html>
