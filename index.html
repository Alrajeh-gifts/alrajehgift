<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هدايا العيد! 🎁</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>">
    <link rel="manifest" id="manifest-link">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { min-height: 100%; margin: 0; background: #090a0f; color: white; overflow-x: hidden; }

        :root {
            --accent: #6366f1;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body::before {
            content: ''; position: fixed; inset: -150px;
            background: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.35) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.30) 0%, transparent 50%);
            filter: blur(90px); z-index: 0; pointer-events: none;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(32px);
            border: 1px solid var(--glass-border);
            z-index: 10;
        }

        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border: none; }
        .btn-primary:active { transform: scale(0.96); opacity: 0.9; }

        .fade-in { animation: fadeUp 0.5s ease forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .wish-item-active { background: #6366f1 !important; color: white !important; border-color: #6366f1 !important; }
    </style>
</head>
<body>

<div id="login-screen" class="max-w-sm w-full fade-in px-4" style="display:flex;flex-direction:column; margin-top: 15vh;">
    <div class="text-center mb-10">
        <div style="font-size:5rem; filter: drop-shadow(0 10px 15px rgba(99,102,241,0.4))">🎁</div>
        <h1 class="text-3xl font-black mt-4">هدايا العيد</h1>
        <p class="text-gray-400 mt-2">أدخل الرمز السري للمفاجأة</p>
    </div>
    <div class="glass rounded-3xl p-6 flex flex-col gap-4">
        <input type="text" id="access-code" placeholder="الرمز السري" 
               class="bg-black/40 border border-white/10 text-white text-center p-4 rounded-2xl font-bold text-xl outline-none focus:border-indigo-500 transition-all">
        <button onclick="login()" id="login-btn" class="btn-primary w-full font-black py-4 rounded-2xl text-lg cursor-pointer shadow-lg shadow-indigo-500/20">
            اكتشف هديتك ←
        </button>
    </div>
</div>

<div id="member-screen" class="fade-in w-full max-w-sm px-4" style="display:none;flex-direction:column;gap:1.5rem">
    <div class="glass rounded-3xl p-8 text-center mt-10 shadow-2xl">
        <p class="text-gray-400 text-sm">أهلاً وسهلاً</p>
        <h2 id="user-welcome" class="text-2xl font-black mb-6"></h2>

        <div id="result-card" class="p-6 rounded-2xl border border-indigo-500/30 bg-indigo-500/5" style="display:none;">
            <p class="text-gray-400 text-sm mb-2">🎯 هديتك ستكون لـ</p>
            <div id="target-name" class="text-4xl font-black text-indigo-400 mb-6 tracking-tight"></div>
            
            <button onclick="toggleWishes()" class="bg-white/5 border border-white/10 text-white px-6 py-2 rounded-full text-xs font-bold mb-4 active:scale-95 transition-all">
                🎁 رغبات الشخص
            </button>
            <div id="wishes-box" style="display:none;" class="mb-4"></div>

            <div class="pt-6 border-t border-white/5 mt-4">
                <div class="bg-indigo-500/20 border border-indigo-500/20 p-3 rounded-2xl mb-4 flex items-center justify-center gap-3">
                    <span class="text-lg">⏳</span>
                    <span id="countdown-timer" class="text-sm font-bold text-indigo-100">...</span>
                </div>

                <button id="deliver-btn" onclick="markAsDelivered()" class="btn-primary w-full py-3 rounded-2xl font-black text-sm">
                    📦 تأكيد تسليم الهدية
                </button>
                <div id="delivered-msg" style="display:none;" class="bg-green-500/10 border border-green-500/30 text-green-400 p-4 rounded-2xl font-bold">
                    ✅ تم التسليم بنجاح!
                </div>
            </div>
        </div>
        
        <div id="no-draw-msg" style="display:none;" class="py-10">
            <p class="text-gray-400 font-bold">لم تُجرَ القرعة بعد، انتظر الإشعار 🔔</p>
        </div>
    </div>

    <div class="glass rounded-3xl p-6">
        <h3 class="font-black text-lg mb-4 text-right">🌟 رغباتي الشخصية</h3>
        <div id="wishes-grid" class="grid grid-cols-2 gap-2 mb-4"></div>
        <input type="text" id="custom-wish-input" placeholder="أو اكتب رغبتك هنا..." 
               class="bg-black/40 border border-white/10 text-white w-full p-3 rounded-xl text-sm outline-none mb-4">
        <button onclick="saveWishes()" id="save-wishes-btn" class="w-full bg-indigo-500/10 border border-indigo-500/20 text-white py-3 rounded-xl font-bold">💾 حفظ الرغبات</button>
    </div>

    <button onclick="location.reload()" class="text-gray-500 font-bold text-sm py-4">← خروج</button>
</div>

<div id="admin-screen" style="display:none;" class="w-full max-w-sm px-4 fade-in flex flex-col gap-4">
    <div class="glass rounded-3xl p-6 mt-10 text-center">
        <h2 class="text-xl font-black">لوحة التحكم 👑</h2>
        <p class="text-gray-400 text-sm mt-1">إدارة قرعة هدايا العيد</p>
    </div>
    <div class="glass rounded-3xl p-6">
        <button onclick="runDraw()" id="draw-btn" class="btn-primary w-full py-4 rounded-2xl font-black text-xl mb-4">🎲 ابدأ القرعة الآن</button>
        <div id="assignments-list" class="flex flex-col gap-2"></div>
    </div>
    <button onclick="location.reload()" class="text-gray-500 font-bold text-sm text-center">← خروج</button>
</div>

<script>
    const SUPABASE_URL = 'https://oprethkloexyrhagmdod.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wcmV0aGtsb2V4eXJoYWdtZG9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTI1MjAsImV4cCI6MjA4ODM4ODUyMH0.crUKNWb8iWJHwe9mp59KcALS4LSuy0dqZn4xEsW04Gc';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentAssignmentId = null;

    // --- خاصية الاهتزاز المحدثة ---
    function doHaptic(pattern) {
        if ("vibrate" in navigator) {
            navigator.vibrate(pattern);
        }
    }

    async function login() {
        // بمجرد الضغط، نهز الجهاز (لفتح صلاحية الاهتزاز للمتصفح)
        doHaptic(60); 

        const btn = document.getElementById('login-btn');
        const code = document.getElementById('access-code').value.trim();
        if (!code) return;

        btn.innerText = '⏳ جاري التحقق...';
        btn.disabled = true;

        const { data: user, error } = await db.from('users').select('*').eq('code', code).single();

        if (error || !user) {
            alert('الرمز السري غير صحيح!');
            btn.innerText = 'اكتشف هديتك ←';
            btn.disabled = false;
            return;
        }

        currentUser = user;
        user.role === 'admin' ? showAdminScreen() : showMemberScreen(user);
    }

    async function showMemberScreen(user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('member-screen').style.display = 'flex';
        document.getElementById('user-welcome').innerText = `${user.name} 👋`;

        buildWishesGrid(user.wishes || '');

        const { data: assign } = await db.from('assignments').select('*, receiver:users!receiver_id(name, wishes)').eq('giver_id', user.id).limit(1).maybeSingle();

        if (assign) {
            currentAssignmentId = assign.id;
            document.getElementById('target-name').innerText = assign.receiver.name;
            
            // اهتزاز مزدوج لحظة كشف الاسم
            setTimeout(() => doHaptic([100, 50, 100]), 200); 
            
            if (assign.is_delivered) {
                document.getElementById('delivered-msg').style.display = 'block';
                document.getElementById('deliver-btn').style.display = 'none';
            } else {
                document.getElementById('deliver-btn').style.display = 'block';
            }
            document.getElementById('result-card').style.display = 'block';
            window.receiverWishesData = (assign.receiver.wishes || '').split(',').filter(Boolean);
        } else {
            document.getElementById('no-draw-msg').style.display = 'block';
        }
    }

    function initCountdown() {
        const eid = new Date("2026-03-20T00:00:00").getTime();
        setInterval(() => {
            const diff = eid - new Date().getTime();
            if (diff < 0) {
                document.getElementById('countdown-timer').innerText = "عيدكم مبارك! 🌙";
                return;
            }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('countdown-timer').innerText = `باقي للعيد: ${d} يوم و ${h} ساعة`;
        }, 1000);
    }
    initCountdown();

    function buildWishesGrid(saved) {
        const options = ['عطور', 'ملابس', 'إلكترونيات', 'قهوة', 'بطاقة هدية', 'كتاب'];
        const grid = document.getElementById('wishes-grid');
        const savedArray = (saved || '').split(',');
        grid.innerHTML = options.map(opt => `
            <button onclick="toggleWishBtn(this)" 
                    class="p-3 rounded-xl border border-white/10 text-xs transition-all ${savedArray.includes(opt) ? 'wish-item-active' : 'bg-white/5 text-gray-400'}">
                ${opt}
            </button>
        `).join('');
    }

    function toggleWishBtn(btn) {
        btn.classList.toggle('wish-item-active');
        doHaptic(30); // اهتزاز خفيف جداً عند اختيار رغبة
    }

    async function saveWishes() {
        const btn = document.getElementById('save-wishes-btn');
        const selected = [...document.querySelectorAll('.wish-item-active')].map(b => b.innerText.trim());
        const custom = document.getElementById('custom-wish-input').value.trim();
        if (custom) selected.push(custom);

        btn.innerText = '⏳ جاري الحفظ...';
        await db.from('users').update({ wishes: selected.join(',') }).eq('id', currentUser.id);
        btn.innerText = '💾 حفظ الرغبات';
        doHaptic(50);
        document.getElementById('save-msg').style.display = 'block';
        setTimeout(() => document.getElementById('save-msg').style.display = 'none', 2000);
    }

    function toggleWishes() {
        const box = document.getElementById('wishes-box');
        box.style.display = box.style.display === 'none' ? 'flex' : 'none';
        box.className = "flex flex-wrap gap-2 justify-center mt-4";
        const data = window.receiverWishesData || [];
        box.innerHTML = data.length ? data.map(w => `<span class="bg-indigo-500/20 border border-indigo-500/30 px-3 py-1 rounded-lg text-xs">${w}</span>`).join('') : '<p class="text-xs text-gray-500">لم يحدد الشخص رغباته بعد</p>';
        doHaptic(20);
    }

    async function markAsDelivered() {
        if (!confirm('هل أنت متأكد من تسليم الهدية؟')) return;
        doHaptic([50, 50, 50]);
        await db.from('assignments').update({ is_delivered: true }).eq('id', currentAssignmentId);
        location.reload();
    }

    async function showAdminScreen() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-screen').style.display = 'flex';
        const { data: assignments } = await db.from('assignments').select('*, giver:users!giver_id(name), receiver:users!receiver_id(name)');
        if (assignments) {
            document.getElementById('assignments-list').innerHTML = assignments.map(a => `
                <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center text-sm border border-white/5">
                    <span class="font-bold text-indigo-300">${a.giver.name}</span>
                    <span class="text-gray-600">←</span>
                    <span class="font-bold">${a.receiver.name}</span>
                </div>
            `).join('');
        }
    }

    async function runDraw() {
        if (!confirm('سيتم مسح القرعة الحالية وعمل قرعة جديدة. هل أنت متأكد؟')) return;
        const btn = document.getElementById('draw-btn');
        btn.innerText = '⏳ جاري السحب...';
        
        const { data: members } = await db.from('users').select('*').eq('role', 'member');
        let shuffled = null;
        for (let i = 0; i < 10000; i++) {
            const temp = [...members].sort(() => Math.random() - 0.5);
            if (!temp.some((m, idx) => m.id === members[idx].id)) {
                const map = {}; members.forEach((m, idx) => map[m.name] = temp[idx].name);
                if (map['فواز'] === 'نواف') continue;
                const giverOfS = Object.keys(map).find(k => map[k] === 'سميرة');
                if (!['طارق', 'فواز'].includes(giverOfS)) continue;
                shuffled = temp; break;
            }
        }
        if (!shuffled) { alert('فشل السحب، جرب مرة أخرى'); btn.innerText = '🎲 ابدأ القرعة الآن'; return; }
        
        await db.from('assignments').delete().neq('id', 0); // مسح القديم
        await db.from('draws').insert({ month_name: 'عيد الفطر' });
        const { data: newDraw } = await db.from('draws').select('id').order('created_at', {ascending:false}).limit(1).single();
        const inserts = members.map((m, idx) => ({ draw_id: newDraw.id, giver_id: m.id, receiver_id: shuffled[idx].id }));
        await db.from('assignments').insert(inserts);
        doHaptic([100, 100, 100]);
        location.reload();
    }
</script>

</body>
</html>
