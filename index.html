<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هدايا العيد! 🎁</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>">
    <link rel="manifest" id="manifest-link">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        html, body { min-height: 100%; margin: 0; }

        :root {
            --accent: #6366f1;
            --bg: #090a0f; 
            --liquid-1: rgba(99, 102, 241, 0.35);
            --liquid-2: rgba(139, 92, 246, 0.30);
            --liquid-3: rgba(59, 130, 246, 0.20);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.75);
            --text-muted: rgba(255, 255, 255, 0.40);
            --input-bg: rgba(0, 0, 0, 0.35);
            --wish-bg: rgba(255, 255, 255, 0.03);
            --wish-active-bg: rgba(99, 102, 241, 0.20);
            --result-bg: linear-gradient(135deg, rgba(99, 102, 241, 0.12), rgba(99, 102, 241, 0.03));
            --success-bg: rgba(74, 222, 128, 0.1);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f3f4f8; 
                --glass-bg: rgba(255, 255, 255, 0.65);
                --text-primary: #1e1b4b;
                --text-secondary: rgba(30, 27, 75, 0.70);
                --input-bg: rgba(255, 255, 255, 0.90);
                --wish-active-bg: rgba(99, 102, 241, 0.15);
            }
        }

        body {
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* السائل الخلفي */
        body::before {
            content: ''; position: fixed; inset: -150px;
            background: radial-gradient(circle at 20% 30%, var(--liquid-1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, var(--liquid-2) 0%, transparent 50%);
            filter: blur(90px); z-index: 0; pointer-events: none;
            animation: swim 18s ease-in-out infinite alternate;
        }
        @keyframes swim { 0% { transform: translate(0,0); } 100% { transform: translate(40px, 60px); } }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(32px) saturate(220%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 24px 48px -12px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-primary:active { transform: scale(0.98); }

        .code-input {
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .fade-in { animation: fadeUp 0.6s ease forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="login-screen" class="max-w-sm w-full fade-in" style="display:flex;flex-direction:column">
    <div class="text-center mb-8 mt-10">
        <div style="font-size:4.5rem; filter: drop-shadow(0 10px 15px rgba(99,102,241,0.3))">🎁</div>
        <h1 style="font-size:2rem;font-weight:900;color:var(--text-primary)">هدايا العيد</h1>
        <p style="color:var(--text-secondary)">أدخل رمزك السري للدخول</p>
    </div>
    <div class="glass" style="border-radius:1.5rem;padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem">
        <input type="text" id="access-code" placeholder="الرمز السري" class="code-input text-center p-4 rounded-xl font-bold text-lg outline-none">
        <button onclick="login()" id="login-btn" class="btn-primary w-full font-black py-4 rounded-xl text-lg border-none cursor-pointer">
            تسجيل الدخول ←
        </button>
    </div>
</div>

<div id="member-screen" class="fade-in w-full max-w-sm" style="display:none;flex-direction:column;gap:1.25rem">
    <div class="glass" style="border-radius:1.5rem;padding:2rem;text-align:center;margin-top:2rem">
        <p style="color:var(--text-secondary);font-size:.85rem">أهلاً وسهلاً</p>
        <h2 id="user-welcome" style="color:var(--text-primary);font-size:1.5rem;font-weight:900;margin-bottom:1.5rem"></h2>

        <div id="result-card" class="result-card p-6 rounded-2xl border" style="display:none; background:var(--result-bg); border-color:rgba(99,102,241,0.2)">
            <p style="color:var(--text-secondary);font-size:.9rem">🎯 ستُهدي هذا العيد</p>
            <div id="target-name" style="font-size:3rem;font-weight:900;color:var(--accent);margin:.5rem 0 1rem; text-shadow: 0 0 20px rgba(99,102,241,0.3)"></div>
            
            <button onclick="toggleWishes()" class="bg-indigo-500/10 border border-indigo-500/30 text-white px-5 py-2 rounded-full text-sm font-bold mb-4">
                🎁 عرض رغبات الهدية
            </button>
            <div id="wishes-box" style="display:none;margin-top:1.25rem"></div>

            <div id="delivery-section" style="margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid rgba(255,255,255,0.1)">
                <div style="background:var(--wish-active-bg);border:1px solid rgba(99,102,241,0.2);padding:.85rem;border-radius:1rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:center;gap:.5rem">
                    <span style="font-size:1rem">⏳</span>
                    <span style="color:var(--text-secondary);font-size:.85rem;font-weight:700">باقي على العيد:</span>
                    <span id="countdown-timer" style="color:var(--text-primary);font-weight:900;font-size:.95rem">...</span>
                </div>

                <button id="deliver-btn" onclick="markAsDelivered()" class="btn-primary w-full py-3 rounded-xl font-bold border-none cursor-pointer">
                    📦 تأكيد تسليم الهدية
                </button>
                <div id="delivered-msg" style="display:none;background:var(--success-bg);border:1px solid rgba(74,222,128,0.3);color:#22c55e;padding:.9rem;border-radius:1rem;font-weight:700">
                    ✅ تم تسليم الهدية بنجاح!
                </div>
            </div>
        </div>
        
        <div id="no-draw-msg" style="display:none;padding:2rem 0">
            <p style="color:var(--text-primary);font-weight:900">لم تُجرَ القرعة بعد ⏳</p>
        </div>
    </div>

    <div class="glass" style="border-radius:1.5rem;padding:1.5rem">
        <h3 style="color:var(--text-primary);font-weight:900;margin-bottom:1rem">🌟 رغباتي في الهدية</h3>
        <div id="wishes-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem"></div>
        <input type="text" id="custom-wish-input" placeholder="أو اكتب هديتك هنا... ✍️" class="code-input w-full p-3 rounded-xl text-sm outline-none mb-4">
        <button onclick="saveWishes()" id="save-wishes-btn" class="w-full bg-white/5 border border-white/10 text-white py-3 rounded-xl font-bold cursor-pointer">💾 حفظ اختياراتي</button>
        <p id="save-msg" style="display:none;color:#22c55e;font-weight:700;text-align:center;margin-top:0.5rem">✅ تم الحفظ!</p>
    </div>

    <button onclick="location.reload()" style="color:var(--text-muted);background:none;border:none;cursor:pointer;padding:1rem;font-weight:700">← تسجيل خروج</button>
</div>

<div id="admin-screen" style="display:none;flex-direction:column;gap:1.25rem" class="w-full max-w-sm fade-in">
    <div class="glass" style="border-radius:1.5rem;padding:1.5rem;margin-top:2rem">
        <h2 style="color:var(--text-primary);font-size:1.3rem;font-weight:900">لوحة المشرف 👑</h2>
    </div>
    <div class="glass" style="border-radius:1.5rem;padding:1.5rem;text-align:center">
        <button onclick="runDraw()" id="draw-btn" class="btn-primary w-full font-black py-4 rounded-2xl text-xl border-none cursor-pointer">🎲 إجراء قرعة جديدة</button>
        <div id="assignments-list" class="mt-4 flex flex-col gap-2"></div>
    </div>
    <button onclick="location.reload()" style="color:var(--text-muted);background:none;border:none;cursor:pointer;padding:1rem;font-weight:700">← تسجيل خروج</button>
</div>

<canvas id="confetti-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:999;display:none"></canvas>

<script>
    // --- SUPABASE SETUP ---
    const SUPABASE_URL = 'https://oprethkloexyrhagmdod.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wcmV0aGtsb2V4eXJoYWdtZG9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTI1MjAsImV4cCI6MjA4ODM4ODUyMH0.crUKNWb8iWJHwe9mp59KcALS4LSuy0dqZn4xEsW04Gc';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let receiverWishes = [];
    let currentAssignmentId = null;

    // --- HAPTIC FEEDBACK ---
    function triggerHaptic(type) {
        if (!("vibrate" in navigator)) return;
        if (type === 'success') navigator.vibrate(50); // نبضة خفيفة عند الدخول
        if (type === 'reveal') navigator.vibrate([100, 50, 100]); // نبضتين عند كشف الاسم
    }

    // --- LOGIN ---
    async function login() {
        const btn = document.getElementById('login-btn');
        const code = document.getElementById('access-code').value.trim();
        if (!code) return;

        btn.innerText = '⏳ جاري التحقق...';
        btn.disabled = true;

        const { data: user, error } = await db.from('users').select('*').eq('code', code).single();

        if (error || !user) {
            alert('الرمز غير صحيح!');
            btn.innerText = 'تسجيل الدخول ←';
            btn.disabled = false;
            return;
        }

        triggerHaptic('success'); // اهتزاز عند قبول الرمز
        user.role === 'admin' ? showAdminScreen() : showMemberScreen(user);
    }

    // --- MEMBER SCREEN ---
    async function showMemberScreen(user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('member-screen').style.display = 'flex';
        document.getElementById('user-welcome').innerText = `${user.name} 👋`;

        buildWishesGrid(user.wishes || '');

        const { data: assign } = await db.from('assignments').select('*, receiver:users!receiver_id(name, wishes)').eq('giver_id', user.id).limit(1).maybeSingle();

        if (assign) {
            currentAssignmentId = assign.id;
            
            // اللحظة الحاسمة: كشف الاسم + اهتزاز هابتك
            document.getElementById('target-name').innerText = assign.receiver.name;
            triggerHaptic('reveal'); 
            
            receiverWishes = (assign.receiver.wishes || '').split(',').filter(Boolean);
            if (assign.is_delivered) { show('delivered-msg'); hide('deliver-btn'); } 
            else { hide('delivered-msg'); show('deliver-btn'); }
            show('result-card');
        } else {
            show('no-draw-msg');
        }
    }

    // --- COUNTDOWN ---
    function initCountdown() {
        const eidDate = new Date("2026-03-20T00:00:00").getTime();
        setInterval(() => {
            const distance = eidDate - new Date().getTime();
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('countdown-timer').innerText = distance < 0 ? "عيد مبارك! 🎉" : `${days} يوم و ${hours} ساعة`;
        }, 1000);
    }
    initCountdown();

    // --- DRAW LOGIC (10,000 Attempts) ---
    async function runDraw() {
        const btn = document.getElementById('draw-btn');
        btn.innerText = '⏳ جاري السحب...';
        btn.disabled = true;

        const { data: members } = await db.from('users').select('*').eq('role', 'member');
        
        let shuffled = null;
        for (let i = 0; i < 10000; i++) {
            const temp = [...members].sort(() => Math.random() - 0.5);
            if (!temp.some((m, idx) => m.id === members[idx].id)) {
                // شروط فواز و سميرة
                const map = {}; members.forEach((m, idx) => map[m.name] = temp[idx].name);
                if (map['فواز'] === 'نواف') continue;
                const giverOfS = Object.keys(map).find(k => map[k] === 'سميرة');
                if (!['طارق', 'فواز'].includes(giverOfS)) continue;
                shuffled = temp; break;
            }
        }

        if (!shuffled) { alert('فشل السحب، حاول مرة أخرى'); btn.disabled = false; return; }

        await db.from('draws').insert({ month_name: 'عيد الفطر' });
        const { data: newDraw } = await db.from('draws').select('id').order('created_at', {ascending:false}).limit(1).single();
        
        const inserts = members.map((m, idx) => ({ draw_id: newDraw.id, giver_id: m.id, receiver_id: shuffled[idx].id }));
        await db.from('assignments').insert(inserts);

        alert('تمت القرعة بنجاح! 🎉');
        location.reload();
    }

    // --- HELPERS ---
    function buildWishesGrid(saved) {
        const options = ['عطور وعناية', 'ملابس', 'تقنية', 'قهوة', 'بطاقة هدية', 'كتب'];
        const grid = document.getElementById('wishes-grid');
        const savedArray = (saved || '').split(',');
        grid.innerHTML = options.map(opt => `
            <button onclick="this.classList.toggle('bg-indigo-500'); this.classList.toggle('text-white')" 
                    class="wish-item p-3 rounded-xl border border-white/10 text-xs ${savedArray.includes(opt) ? 'bg-indigo-500 text-white' : 'text-white/60'}">
                ${opt}
            </button>
        `).join('');
    }

    async function saveWishes() {
        const btn = document.getElementById('save-wishes-btn');
        const selected = [...document.querySelectorAll('.wish-item.bg-indigo-500')].map(b => b.innerText.trim());
        const custom = document.getElementById('custom-wish-input').value.trim();
        if (custom) selected.push(custom);

        btn.innerText = '⏳ جاري الحفظ...';
        await db.from('users').update({ wishes: selected.join(',') }).eq('id', currentUser.id);
        btn.innerText = '💾 حفظ اختياراتي';
        show('save-msg'); setTimeout(() => hide('save-msg'), 2000);
    }

    function toggleWishes() {
        const box = document.getElementById('wishes-box');
        box.style.display = box.style.display === 'none' ? 'block' : 'none';
        box.innerHTML = receiverWishes.length ? receiverWishes.map(w => `<span class="inline-block bg-white/10 p-2 rounded-lg m-1 text-sm">${w}</span>`).join('') : 'لم يحدد رغباته بعد';
    }

    async function markAsDelivered() {
        if (!confirm('تأكيد التسليم؟')) return;
        await db.from('assignments').update({ is_delivered: true }).eq('id', currentAssignmentId);
        location.reload();
    }

    function show(id) { document.getElementById(id).style.display = 'block'; }
    function hide(id) { document.getElementById(id).style.display = 'none'; }
</script>

</body>
</html>
