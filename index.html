<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>هدايا العائلة 🎁</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <link rel="manifest" id="manifest-link">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ================================================================
           💎 نظام الألوان والمقاسات الموزون (Perfect UI System)
        ================================================================ */
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* امتداد الشاشة بالكامل للأعلى (Full Screen) */
        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background-color: var(--bg-app); 
            transition: background-color 0.3s ease;
        }
        
        body {
            display: flex; flex-direction: column; align-items: center;
            padding-top: env(safe-area-inset-top); /* دمج طبيعي مع أعلى الشاشة */
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: 1rem; padding-right: 1rem;
            min-height: 100dvh;
            color: var(--text-main);
        }

        /* --- الألوان (الوضع الداكن - الافتراضي) --- */
        :root {
            --bg-app: #0a0b10;
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.6);
            --text-accent: #818cf8;
            
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --inner-bg: rgba(0, 0, 0, 0.3);
            
            --btn-primary: linear-gradient(135deg, #6366f1, #4f46e5);
            --btn-text: #ffffff;
            
            --wish-bg: rgba(255, 255, 255, 0.05);
            --wish-active: #6366f1;
            
            --liquid-1: rgba(99, 102, 241, 0.3);
            --liquid-2: rgba(139, 92, 246, 0.2);
        }

        /* --- الألوان (الوضع النهاري - تباين عالي) --- */
        @media (prefers-color-scheme: light) {
            :root {
                --bg-app: #f4f6f9;
                --text-main: #0f172a; /* كحلي داكن للنصوص الرئيسية */
                --text-sub: #475569; /* رمادي داكن للنصوص الفرعية */
                --text-accent: #4338ca; /* لون الاسم (طارق/محمد) */
                
                --card-bg: rgba(255, 255, 255, 0.95);
                --card-border: rgba(99, 102, 241, 0.2);
                --inner-bg: rgba(99, 102, 241, 0.05);
                
                --btn-primary: linear-gradient(135deg, #4f46e5, #4338ca);
                --btn-text: #ffffff;
                
                --wish-bg: rgba(99, 102, 241, 0.08); /* خلفية الرغبات في النهار */
                --wish-active: #4f46e5;
                
                --liquid-1: rgba(99, 102, 241, 0.15);
                --liquid-2: rgba(236, 72, 153, 0.1);
            }
            .admin-row { background: #ffffff !important; border-color: rgba(99, 102, 241, 0.2) !important; }
        }

        /* --- الخلفية السائلة --- */
        .liquid-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.8; }
        .blob-1 { width: 500px; height: 500px; top: -100px; right: -100px; background: var(--liquid-1); animation: float1 20s infinite alternate; }
        .blob-2 { width: 400px; height: 400px; bottom: -50px; left: -50px; background: var(--liquid-2); animation: float2 18s infinite alternate-reverse; }
        @keyframes float1 { 100% { transform: translate(50px, 50px); } }
        @keyframes float2 { 100% { transform: translate(-50px, 50px); } }

        /* --- هندسة البطاقات (مقاسات متطابقة) --- */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--card-border);
            border-radius: 2rem; /* زوايا ناعمة وموحدة */
            padding: 1.5rem; /* مسافة داخلية متناسقة */
            width: 100%; max-width: 24rem; 
            margin-bottom: 1.5rem;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
        }

        .inner-box {
            background: var(--inner-bg);
            border: 1px solid var(--card-border);
            border-radius: 1.25rem;
            padding: 1.25rem;
        }

        /* --- الأزرار والحقول --- */
        .btn-primary {
            background: var(--btn-primary);
            color: var(--btn-text) !important;
            border: none; border-radius: 1.25rem;
            padding: 1.2rem; font-weight: 900; font-size: 1.1rem;
            width: 100%; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.25rem;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }
        .btn-primary:active:not(:disabled) { transform: scale(0.96); box-shadow: none; }
        
        /* قفل الزر بشكل حقيقي (Disabled) */
        .btn-primary:disabled {
            background: var(--inner-bg);
            color: var(--text-sub) !important;
            border: 1px solid var(--card-border);
            box-shadow: none; cursor: not-allowed; opacity: 0.8;
        }

        .input-field {
            background: var(--inner-bg); border: 1px solid var(--card-border);
            color: var(--text-main); border-radius: 1.25rem;
            padding: 1.2rem; font-weight: 700; text-align: center;
            width: 100%; outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: var(--accent); }
        .input-field::placeholder { color: var(--text-sub); font-weight: 600; opacity: 0.7; }

        /* --- الرغبات --- */
        .wish-chip {
            background: var(--wish-bg); border: 1px solid var(--card-border);
            color: var(--text-sub); border-radius: 1rem; padding: 1rem 0.5rem;
            font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .wish-active {
            background: var(--wish-active) !important; color: #ffffff !important; 
            border-color: var(--wish-active) !important; font-weight: 900;
        }

        .hidden-el { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="liquid-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>

<div id="login-screen" class="fade-in w-full max-w-sm flex flex-col items-center justify-center flex-1">
    <div class="text-center mb-8">
        <div style="font-size: 5rem; filter: drop-shadow(0 10px 20px rgba(99,102,241,0.3));">🎁</div>
        <h1 class="text-4xl font-black mt-2" style="color: var(--text-main)">هدايا العائلة</h1>
        <p class="mt-2 text-sm font-bold" style="color: var(--text-sub)">أدخل الرمز السري للانضمام</p>
    </div>
    
    <div class="glass-card flex flex-col gap-4">
        <input type="password" id="access-code" placeholder="الرمز السري" class="input-field text-2xl tracking-widest">
        <button onclick="login()" id="login-btn" class="btn-primary flex-row">
            <span id="login-btn-text">اكتشف هديتك ←</span>
        </button>
    </div>
</div>

<div id="member-screen" class="fade-in w-full max-w-sm hidden-el flex-col items-center mt-6">
    
    <div class="glass-card text-center">
        <h2 id="user-welcome" class="text-2xl font-black mb-6" style="color: var(--text-main)"></h2>

        <div id="result-card" class="hidden-el">
            <div class="inner-box mb-5">
                <p class="text-xs font-bold mb-1" style="color: var(--text-sub)">🎯 هديتك هذا العيد لـ</p>
                <div id="target-name" class="text-5xl font-black mb-4" style="color: var(--text-accent); text-shadow: 0 4px 15px rgba(99,102,241,0.2);"></div>
                
                <div id="budget-display" class="hidden-el bg-black/10 rounded-xl p-3 flex justify-center gap-2 mb-4" style="background: var(--inner-bg);">
                    <span class="text-xs font-bold" style="color: var(--text-sub)">💰 الميزانية:</span>
                    <span id="budget-amount" class="font-black text-sm" style="color: var(--text-accent)"></span>
                </div>

                <button onclick="toggleWishes()" class="w-full py-2.5 rounded-xl text-xs font-bold border transition-colors" style="background: var(--card-bg); color: var(--text-main); border-color: var(--card-border);">
                    🎁 عرض رغباته المفضلة
                </button>
                <div id="wishes-box" class="hidden-el flex-wrap justify-center gap-2 mt-4"></div>
            </div>

            <button id="deliver-btn" onclick="markAsDelivered()" class="btn-primary" disabled>
                <span id="deliver-btn-title" class="font-black text-lg">⏳ جاري الحساب...</span>
                <span id="deliver-btn-sub" class="text-xs font-bold opacity-80">يرجى الانتظار</span>
            </button>
            
            <div id="delivered-msg" class="hidden-el inner-box font-black text-sm text-center" style="background: rgba(34, 197, 94, 0.1); color: #16a34a; border-color: rgba(34, 197, 94, 0.2);">
                ✅ كفيت ووفيت، تم تأكيد التسليم!
            </div>
        </div>
        
        <div id="no-draw-msg" class="hidden-el py-10 font-black text-lg" style="color: var(--text-sub)">لم تُجرَ القرعة بعد ⏳</div>
    </div>

    <div class="glass-card">
        <h3 class="font-black text-lg mb-1 text-right" style="color: var(--text-main)">🌟 رغباتي الشخصية</h3>
        <p class="text-[10px] mb-5 text-right font-bold" style="color: var(--text-sub)">اختر ما تفضله ليراه من سيهديك</p>
        
        <div id="wishes-grid" class="grid grid-cols-2 gap-2 mb-5"></div>
        
        <input type="text" id="custom-wish-input" placeholder="أو اكتب رغبة مخصصة... ✍️" class="input-field mb-5 text-sm p-3">
        <button onclick="saveWishes()" id="save-wishes-btn" class="btn-primary flex-row py-3 text-sm">
            <span id="save-btn-text">💾 حفظ اختياراتي</span>
        </button>
    </div>

    <button onclick="logout()" class="font-bold text-xs py-2 transition-opacity" style="color: var(--text-sub); opacity: 0.6;">← تسجيل خروج آمن</button>
</div>

<div id="admin-screen" class="fade-in w-full max-w-sm hidden-el flex-col items-center mt-6">
    <div class="glass-card text-center">
        <div class="text-4xl mb-2">👑</div>
        <h2 class="text-xl font-black mb-6" style="color: var(--text-main)">لوحة المشرف</h2>

        <div class="inner-box text-right flex flex-col gap-4 mb-6">
            <p class="text-[10px] font-bold uppercase tracking-widest" style="color: var(--text-sub)">⚙️ قيود السحب الذكية</p>
            <div class="flex justify-between items-center font-bold text-sm" style="color: var(--text-main)">
                <span>فواز لا يُهدي نواف</span>
                <input type="checkbox" id="fawaz-toggle" checked class="w-5 h-5 accent-indigo-500">
            </div>
            <div class="flex justify-between items-center font-bold text-sm" style="color: var(--text-main)">
                <span>سميرة تُهدى من طارق/فواز فقط</span>
                <input type="checkbox" id="sameera-toggle" checked class="w-5 h-5 accent-indigo-500">
            </div>
        </div>

        <div class="text-right mb-6">
             <label class="text-[10px] font-bold block mb-2" style="color: var(--text-sub)">💰 تحديد الميزانية (اختياري)</label>
             <input type="text" id="budget-input" placeholder="مثال: 500 ريال" class="input-field text-base">
        </div>

        <button onclick="runDraw()" id="draw-btn" class="btn-primary flex-row text-lg">
            <span id="draw-btn-text">🎲 إجراء قرعة جديدة</span>
        </button>
    </div>

    <div id="assignments-section" class="hidden-el w-full">
        <div class="glass-card">
            <h3 class="text-center font-black text-lg mb-5 pb-3 border-b" style="border-color: var(--card-border); color: var(--text-main)">📋 التوزيع الحالي</h3>
            <div id="assignments-list" class="flex flex-col gap-2"></div>
        </div>
    </div>

    <button onclick="logout()" class="font-bold text-xs py-2" style="color: var(--text-sub); opacity: 0.6;">← خروج المشرف</button>
</div>

<canvas id="confetti-canvas" style="position:fixed; inset:0; pointer-events:none; z-index:999; display:none;"></canvas>

<script>
    const SUPABASE_URL = 'https://oprethkloexyrhagmdod.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wcmV0aGtsb2V4eXJoYWdtZG9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTI1MjAsImV4cCI6MjA4ODM4ODUyMH0.crUKNWb8iWJHwe9mp59KcALS4LSuy0dqZn4xEsW04Gc';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentAssignmentId = null;
    let receiverWishesData = [];
    const arabicMonths = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

    window.onload = async () => {
        const savedCode = localStorage.getItem('rajeh_gift_final_v11');
        if (savedCode) {
            document.getElementById('access-code').value = savedCode;
            login(true);
        }
    };

    function haptic(pattern) {
        if ("vibrate" in navigator) { try { navigator.vibrate(pattern); } catch (e) {} }
    }

    async function login(isAuto = false) {
        if(!isAuto) haptic(50); 
        const btnText = document.getElementById('login-btn-text');
        const code = document.getElementById('access-code').value.trim();
        
        if (!code) return;
        if (!isAuto) btnText.innerText = 'جاري التحقق...';

        const { data: user, error } = await db.from('users').select('*').eq('code', code).single();

        if (error || !user) {
            if (!isAuto) { haptic([50, 100, 50]); alert('الرمز السري غير صحيح!'); }
            localStorage.removeItem('rajeh_gift_final_v11');
            btnText.innerText = 'اكتشف هديتك ←';
            return;
        }

        localStorage.setItem('rajeh_gift_final_v11', code);
        currentUser = user;
        user.role === 'admin' ? showAdminScreen() : showMemberScreen(user);
    }

    function logout() {
        if(confirm('تأكيد تسجيل الخروج؟')){
            localStorage.removeItem('rajeh_gift_final_v11');
            location.reload();
        }
    }

    async function showMemberScreen(user) {
        document.getElementById('login-screen').classList.add('hidden-el');
        document.getElementById('member-screen').classList.remove('hidden-el');
        
        const welcomeEl = document.getElementById('user-welcome');
        if (user.name === 'سميرة') {
            welcomeEl.innerHTML = "يا هلا بست الحبايب أمنا سميرة ❤️👑";
            welcomeEl.style.color = "#fbbf24";
        } else {
            welcomeEl.innerText = "يا هلا، " + user.name;
        }

        buildWishesGrid(user.wishes || '');

        const { data: drawData } = await db.from('draws').select('*').order('created_at', {ascending: false}).limit(1).maybeSingle();
        
        if (drawData) {
            if (drawData.budget) {
                document.getElementById('budget-amount').innerText = drawData.budget;
                document.getElementById('budget-display').classList.remove('hidden-el');
            }

            const { data: assign } = await db.from('assignments')
                .select('*, receiver:users!receiver_id(name, wishes)')
                .eq('giver_id', user.id).eq('draw_id', drawData.id).maybeSingle();

            if (assign) {
                currentAssignmentId = assign.id;
                document.getElementById('target-name').innerText = assign.receiver.name;
                setTimeout(() => haptic([100, 50, 100]), 500); 

                if (assign.is_delivered) {
                    document.getElementById('delivered-msg').classList.remove('hidden-el');
                    document.getElementById('deliver-btn').classList.add('hidden-el');
                } else {
                    document.getElementById('deliver-btn').classList.remove('hidden-el');
                }
                
                document.getElementById('result-card').classList.remove('hidden-el');
                receiverWishesData = (assign.receiver.wishes || '').split(',').filter(Boolean);
            } else {
                document.getElementById('no-draw-msg').classList.remove('hidden-el');
            }
        } else {
            document.getElementById('no-draw-msg').classList.remove('hidden-el');
        }
    }

    // --- نظام قفل الزر والمؤقت الصارم ---
    let countdownInterval;
    function initCountdown() {
        const eidDate = new Date("2026-03-20T00:00:00").getTime();
        const deliverBtn = document.getElementById('deliver-btn');
        const btnTitle = document.getElementById('deliver-btn-title');
        const btnSub = document.getElementById('deliver-btn-sub');

        countdownInterval = setInterval(() => {
            const now = new Date().getTime();
            const diff = eidDate - now;

            if (diff < 0) { 
                clearInterval(countdownInterval);
                if(deliverBtn) {
                    deliverBtn.disabled = false; // فتح الزر برمجياً
                    if(btnTitle) btnTitle.innerText = "📦 تأكيد تسليم الهدية";
                    if(btnSub) btnSub.innerText = "اضغط هنا لتأكيد التسليم";
                }
                return; 
            }
            
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            
            if(deliverBtn) {
                deliverBtn.disabled = true; // قفل الزر برمجياً
                if(btnTitle) btnTitle.innerText = "🔒 يفتح يوم العيد";
                if(btnSub) btnSub.innerText = `باقي: ${d} يوم و ${h} ساعة`;
            }
        }, 1000);
    }
    initCountdown();

    function buildWishesGrid(saved) {
        const options = ['عطور وعناية', 'ملابس وأناقة', 'إلكترونيات', 'قهوة وحلويات', 'ساعة فخمة', 'كتب'];
        const grid = document.getElementById('wishes-grid');
        const savedArray = (saved || '').split(',');
        grid.innerHTML = options.map(opt => `
            <button onclick="toggleWish(this)" class="wish-chip ${savedArray.includes(opt) ? 'wish-active' : ''}">
                ${opt}
            </button>
        `).join('');
    }

    function toggleWish(btn) { btn.classList.toggle('wish-active'); haptic(20); }

    async function saveWishes() {
        haptic(50);
        const btnText = document.getElementById('save-btn-text');
        const selected = [...document.querySelectorAll('.wish-active')].map(b => b.innerText);
        const custom = document.getElementById('custom-wish-input').value.trim();
        if (custom) selected.push(custom);
        
        btnText.innerText = '⏳ جاري الحفظ...';
        await db.from('users').update({ wishes: selected.join(',') }).eq('id', currentUser.id);
        alert('تم الحفظ بنجاح! ✅');
        btnText.innerText = '💾 حفظ اختياراتي';
    }

    function toggleWishes() {
        haptic(20);
        const box = document.getElementById('wishes-box');
        box.classList.toggle('hidden-el'); box.classList.add('flex');
        box.innerHTML = receiverWishesData.length 
            ? receiverWishesData.map(w => `<span class="px-3 py-1.5 rounded-lg text-xs font-bold border" style="background:var(--inner-bg); color:var(--text-main); border-color:var(--card-border)">${w}</span>`).join('') 
            : '<p class="text-xs font-bold" style="color:var(--text-sub)">لم يحدد هذا الشخص رغباته بعد</p>';
    }

    async function markAsDelivered() {
        if(!confirm('هل أنت متأكد أنك قمت بتسليم الهدية؟ 🎁')) return;
        haptic([50, 50, 50]);
        const btnTitle = document.getElementById('deliver-btn-title');
        const btnSub = document.getElementById('deliver-btn-sub');
        btnTitle.innerText = "⏳ جاري التحديث...";
        btnSub.innerText = "";
        
        const { error } = await db.from('assignments').update({ is_delivered: true }).eq('id', currentAssignmentId);
        if(!error) {
            fireConfetti();
            document.getElementById('deliver-btn').classList.add('hidden-el');
            document.getElementById('delivered-msg').classList.remove('hidden-el');
        }
    }

    async function showAdminScreen() {
        document.getElementById('login-screen').classList.add('hidden-el');
        document.getElementById('admin-screen').classList.remove('hidden-el');
        
        const { data: assigns } = await db.from('assignments').select('*, giver:users!giver_id(name), receiver:users!receiver_id(name)').order('created_at', {ascending: false});
        if (assigns && assigns.length > 0) {
            document.getElementById('assignments-section').classList.remove('hidden-el');
            document.getElementById('assignments-list').innerHTML = assigns.map(a => `
                <div class="inner-box admin-row p-3 flex justify-between items-center text-sm">
                    <span class="font-black text-indigo-500 w-1/3 text-right">${a.giver.name}</span>
                    <span class="text-[10px] font-bold w-1/3 text-center" style="color: ${a.is_delivered ? '#16a34a' : 'var(--text-sub)'}">${a.is_delivered ? '✅ سُلّمت' : '⏳ بالانتظار'}</span>
                    <span class="font-black w-1/3 text-left" style="color:var(--text-main)">${a.receiver.name}</span>
                </div>
            `).join('');
        }
    }

    async function runDraw() {
        haptic(100);
        if(!confirm('سيتم إجراء قرعة وتطبيق نظام منع التكرار لـ 3 أشهر. متأكد؟')) return;
        const btnText = document.getElementById('draw-btn-text');
        btnText.innerText = 'جاري السحب الذكي... 🎲';
        document.getElementById('draw-btn').disabled = true;

        const { data: members } = await db.from('users').select('*').eq('role', 'member');
        const fC = document.getElementById('fawaz-toggle').checked;
        const sC = document.getElementById('sameera-toggle').checked;
        const budget = document.getElementById('budget-input').value.trim();

        const { data: recentDraws } = await db.from('draws').select('id').order('created_at', {ascending: false}).limit(3);
        let recentPairs = [];
        if (recentDraws && recentDraws.length > 0) {
            const { data: recentAssigns } = await db.from('assignments').select('*, giver:users!giver_id(name), receiver:users!receiver_id(name)').in('draw_id', recentDraws.map(d=>d.id));
            if (recentAssigns) recentPairs = recentAssigns.map(a => ({ giver: a.giver.name, receiver: a.receiver.name }));
        }

        let shuffled = null;
        for (let i = 0; i < 10000; i++) {
            const temp = [...members].sort(() => Math.random() - 0.5);
            if (!temp.some((m, idx) => m.id === members[idx].id)) {
                const map = {}; members.forEach((m, idx) => map[m.name] = temp[idx].name);
                if (fC && map['فواز'] === 'نواف') continue;
                if (sC) {
                    const giverOfS = Object.keys(map).find(k => map[k] === 'سميرة');
                    if (!['طارق', 'فواز'].includes(giverOfS)) continue;
                }
                if (recentPairs.some(pair => map[pair.giver] === pair.receiver)) continue;

                shuffled = temp; break;
            }
        }

        if (!shuffled) { alert('فشل السحب بسبب كثرة القيود وعدم التكرار!'); document.getElementById('draw-btn').disabled = false; btnText.innerText = '🎲 إجراء قرعة جديدة'; return; }

        const dName = `هدايا ${arabicMonths[new Date().getMonth()]} ${new Date().getFullYear()}`;

        await db.from('assignments').delete().neq('id', 0);
        const { data: d } = await db.from('draws').insert({ month_name: dName, budget: budget }).select().single();
        await db.from('assignments').insert(members.map((m, idx) => ({ draw_id: d.id, giver_id: m.id, receiver_id: shuffled[idx].id, is_delivered: false })));

        fireConfetti();
        alert('تمت القرعة بنجاح! 🎉');
        location.reload();
    }

    function fireConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        canvas.style.display = 'block';
        const colors = ['#6366f1','#a5b4fc','#ec4899','#ffffff','#facc15'];
        const pieces = Array.from({length: 150}, () => ({
            x: Math.random() * canvas.width, y: -20, w: Math.random() * 8 + 4, h: Math.random() * 5 + 3,
            color: colors[Math.floor(Math.random() * colors.length)],
            vy: Math.random() * 5 + 3, vx: (Math.random() - 0.5) * 5, r: Math.random() * 360
        }));
        let frame = 0;
        (function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pieces.forEach(p => {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r * Math.PI/180);
                ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, 1 - frame/200);
                ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
                p.y += p.vy; p.x += p.vx;
            });
            if (++frame < 220) requestAnimationFrame(anim); else canvas.style.display = 'none';
        })();
    }
</script>
