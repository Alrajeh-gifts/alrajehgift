<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هدايا العيد! 🎁</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>">
    <link rel="manifest" id="manifest-link">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* المتغيرات الأساسية (الوضع الداكن الافتراضي) */
        :root {
            --bg: #090a0f;
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.7);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 0, 0, 0.4);
            --accent: #6366f1;
            --card-result: rgba(99, 102, 241, 0.1);
        }

        /* تعديلات النمط النهاري (Light Mode) */
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f5f7fa;
                --text-main: #1e1b4b;
                --text-sub: #475569;
                --glass-bg: rgba(255, 255, 255, 0.8);
                --glass-border: rgba(99, 102, 241, 0.2);
                --input-bg: #ffffff;
                --card-result: rgba(99, 102, 241, 0.05);
            }
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        /* خلفية السائل المتحرك */
        .liquid-bg {
            position: fixed; inset: -150px;
            background: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            filter: blur(80px); z-index: -1;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #ffffff !important;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary:active { transform: scale(0.95); opacity: 0.9; }

        input {
            background: var(--input-bg) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--glass-border) !important;
        }
        input::placeholder { color: var(--text-sub); opacity: 0.5; }

        .fade-in { animation: fadeUp 0.5s ease-out forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .wish-active { background: #6366f1 !important; color: white !important; }
    </style>
</head>
<body>

<div class="liquid-bg"></div>

<div id="login-screen" class="max-w-sm w-full fade-in px-6" style="margin-top: 15vh;">
    <div class="text-center mb-8">
        <div style="font-size: 5rem; filter: drop-shadow(0 10px 15px rgba(99,102,241,0.3))">🎁</div>
        <h1 class="text-3xl font-black mt-4" style="color: var(--text-main)">هدايا العيد</h1>
        <p style="color: var(--text-sub)">أدخل الرمز السري للمفاجأة</p>
    </div>
    <div class="glass rounded-3xl p-6 flex flex-col gap-4">
        <input type="text" id="access-code" placeholder="الرمز السري" 
               class="text-center p-4 rounded-2xl font-bold text-xl outline-none focus:ring-2 ring-indigo-500">
        <button onclick="login()" id="login-btn" class="btn-primary w-full font-black py-4 rounded-2xl text-lg cursor-pointer">
            اكتشف هديتك ←
        </button>
    </div>
</div>

<div id="member-screen" class="fade-in w-full max-w-sm px-4" style="display:none; flex-direction:column; gap:1.5rem; padding-bottom: 2rem;">
    <div class="glass rounded-3xl p-8 text-center mt-10 shadow-xl">
        <p style="color: var(--text-sub)" class="text-sm">أهلاً وسهلاً</p>
        <h2 id="user-welcome" class="text-2xl font-black mb-6" style="color: var(--text-main)"></h2>

        <div id="result-card" class="p-6 rounded-2xl border border-indigo-500/20" style="display:none; background: var(--card-result)">
            <p style="color: var(--text-sub)" class="text-xs mb-1">🎯 هديتك ستكون لـ</p>
            <div id="target-name" class="text-4xl font-black text-indigo-500 mb-6 tracking-tight"></div>
            
            <button onclick="toggleWishes()" class="bg-indigo-500/10 border border-indigo-500/20 px-6 py-2 rounded-full text-xs font-bold mb-4" style="color: var(--text-main)">
                🎁 رغبات الشخص
            </button>
            <div id="wishes-box" style="display:none;" class="mb-4 flex-wrap justify-center gap-2"></div>

            <div class="pt-6 border-t border-indigo-500/10 mt-4">
                <div class="bg-indigo-500/10 p-3 rounded-2xl mb-4 flex items-center justify-center gap-2 border border-indigo-500/10">
                    <span class="text-lg">⏳</span>
                    <span id="countdown-timer" class="text-sm font-bold" style="color: var(--text-main)">...</span>
                </div>

                <button id="deliver-btn" onclick="markAsDelivered()" class="btn-primary w-full py-3 rounded-2xl font-black text-sm">
                    📦 تأكيد تسليم الهدية
                </button>
                <div id="delivered-msg" style="display:none;" class="bg-green-500/10 text-green-600 p-4 rounded-2xl font-bold text-sm">
                    ✅ تم التسليم بنجاح!
                </div>
            </div>
        </div>
        
        <div id="no-draw-msg" style="display:none;" class="py-10">
            <p style="color: var(--text-sub)" class="font-bold">لم تُجرَ القرعة بعد، انتظر الإشعار 🔔</p>
        </div>
    </div>

    <div class="glass rounded-3xl p-6">
        <h3 class="font-black text-lg mb-4 text-right" style="color: var(--text-main)">🌟 رغباتي الشخصية</h3>
        <div id="wishes-grid" class="grid grid-cols-2 gap-2 mb-4"></div>
        <input type="text" id="custom-wish-input" placeholder="أو اكتب رغبتك هنا..." 
               class="w-full p-3 rounded-xl text-sm outline-none mb-4">
        <button onclick="saveWishes()" id="save-wishes-btn" class="w-full py-3 rounded-xl font-bold border border-indigo-500/30" style="color: var(--text-main); background: rgba(99,102,241,0.05)">💾 حفظ الرغبات</button>
    </div>

    <button onclick="location.reload()" class="font-bold text-sm py-4" style="color: var(--text-sub)">← خروج</button>
</div>

<div id="admin-screen" style="display:none;" class="w-full max-w-sm px-4 fade-in flex flex-col gap-4">
    <div class="glass rounded-3xl p-6 mt-10 text-center">
        <h2 class="text-xl font-black" style="color: var(--text-main)">لوحة التحكم 👑</h2>
    </div>
    <div class="glass rounded-3xl p-6">
        <button onclick="runDraw()" id="draw-btn" class="btn-primary w-full py-4 rounded-2xl font-black text-xl mb-6">🎲 ابدأ القرعة الآن</button>
        <div id="assignments-list" class="flex flex-col gap-2"></div>
    </div>
    <button onclick="location.reload()" class="font-bold text-sm text-center py-4" style="color: var(--text-sub)">← خروج</button>
</div>

<script>
    const SUPABASE_URL = 'https://oprethkloexyrhagmdod.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wcmV0aGtsb2V4eXJoYWdtZG9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTI1MjAsImV4cCI6MjA4ODM4ODUyMH0.crUKNWb8iWJHwe9mp59KcALS4LSuy0dqZn4xEsW04Gc';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentAssignmentId = null;

    function doHaptic(pattern) {
        if ("vibrate" in navigator) navigator.vibrate(pattern);
    }

    async function login() {
        doHaptic(60); 
        const btn = document.getElementById('login-btn');
        const code = document.getElementById('access-code').value.trim();
        if (!code) return;

        btn.innerText = '⏳ جاري التحقق...';
        btn.disabled = true;

        const { data: user, error } = await db.from('users').select('*').eq('code', code).single();

        if (error || !user) {
            alert('الرمز السري غير صحيح!');
            btn.innerText = 'اكتشف هديتك ←';
            btn.disabled = false;
            return;
        }

        currentUser = user;
        user.role === 'admin' ? showAdminScreen() : showMemberScreen(user);
    }

    async function showMemberScreen(user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('member-screen').style.display = 'flex';
        document.getElementById('user-welcome').innerText = `${user.name} 👋`;

        buildWishesGrid(user.wishes || '');

        const { data: assign } = await db.from('assignments').select('*, receiver:users!receiver_id(name, wishes)').eq('giver_id', user.id).limit(1).maybeSingle();

        if (assign) {
            currentAssignmentId = assign.id;
            document.getElementById('target-name').innerText = assign.receiver.name;
            setTimeout(() => doHaptic([100, 50, 100]), 300); 
            
            if (assign.is_delivered) {
                document.getElementById('delivered-msg').style.display = 'block';
                document.getElementById('deliver-btn').style.display = 'none';
            } else {
                document.getElementById('deliver-btn').style.display = 'block';
            }
            document.getElementById('result-card').style.display = 'block';
            window.receiverWishesData = (assign.receiver.wishes || '').split(',').filter(Boolean);
        } else {
            document.getElementById('no-draw-msg').style.display = 'block';
        }
    }

    function initCountdown() {
        const eid = new Date("2026-03-20T00:00:00").getTime();
        setInterval(() => {
            const diff = eid - new Date().getTime();
            if (diff < 0) { document.getElementById('countdown-timer').innerText = "عيدكم مبارك! 🌙"; return; }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('countdown-timer').innerText = `باقي للعيد: ${d} يوم و ${h} ساعة`;
        }, 1000);
    }
    initCountdown();

    function buildWishesGrid(saved) {
        const options = ['عطور', 'ملابس', 'إلكترونيات', 'قهوة', 'بطاقة هدية', 'كتاب'];
        const grid = document.getElementById('wishes-grid');
        const savedArray = (saved || '').split(',');
        grid.innerHTML = options.map(opt => `
            <button onclick="toggleWishBtn(this)" 
                    class="p-3 rounded-xl border border-indigo-500/10 text-xs transition-all ${savedArray.includes(opt) ? 'wish-active' : 'bg-indigo-500/5'}">
                ${opt}
            </button>
        `).join('');
    }

    function toggleWishBtn(btn) {
        btn.classList.toggle('wish-active');
        doHaptic(30);
    }

    async function saveWishes() {
        const btn = document.getElementById('save-wishes-btn');
        const selected = [...document.querySelectorAll('.wish-active')].map(b => b.innerText.trim());
        const custom = document.getElementById('custom-wish-input').value.trim();
        if (custom) selected.push(custom);

        btn.innerText = '⏳ جاري الحفظ...';
        await db.from('users').update({ wishes: selected.join(',') }).eq('id', currentUser.id);
        btn.innerText = '💾 حفظ الرغبات';
        doHaptic(50);
        alert('تم الحفظ بنجاح!');
    }

    function toggleWishes() {
        const box = document.getElementById('wishes-box');
        box.style.display = box.style.display === 'none' ? 'flex' : 'none';
        const data = window.receiverWishesData || [];
        box.innerHTML = data.length ? data.map(w => `<span class="bg-indigo-500/10 border border-indigo-500/20 px-4 py-2 rounded-xl text-xs font-bold">${w}</span>`).join('') : '<p class="text-xs opacity-50">لم يحدد الشخص رغباته بعد</p>';
        doHaptic(20);
    }

    async function markAsDelivered() {
        if (!confirm('هل أنت متأكد من تسليم الهدية؟')) return;
        doHaptic([50, 50, 50]);
        await db.from('assignments').update({ is_delivered: true }).eq('id', currentAssignmentId);
        location.reload();
    }

    async function showAdminScreen() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-screen').style.display = 'flex';
        const { data: assignments } = await db.from('assignments').select('*, giver:users!giver_id(name), receiver:users!receiver_id(name)');
        if (assignments) {
            document.getElementById('assignments-list').innerHTML = assignments.map(a => `
                <div class="bg-indigo-500/5 p-4 rounded-2xl flex justify-between items-center text-sm border border-indigo-500/10 mb-2">
                    <span class="font-bold text-indigo-600">${a.giver.name}</span>
                    <span class="opacity-30">←</span>
                    <span class="font-bold">${a.receiver.name}</span>
                </div>
            `).join('');
        }
    }

    async function runDraw() {
        if (!confirm('سيتم إنشاء قرعة جديدة. هل أنت متأكد؟')) return;
        const btn = document.getElementById('draw-btn');
        btn.innerText = '⏳ جاري السحب...';
        
        const { data: members } = await db.from('users').select('*').eq('role', 'member');
        let shuffled = null;
        for (let i = 0; i < 10000; i++) {
            const temp = [...members].sort(() => Math.random() - 0.5);
            if (!temp.some((m, idx) => m.id === members[idx].id)) {
                const map = {}; members.forEach((m, idx) => map[m.name] = temp[idx].name);
                if (map['فواز'] === 'نواف') continue;
                const giverOfS = Object.keys(map).find(k => map[k] === 'سميرة');
                if (!['طارق', 'فواز'].includes(giverOfS)) continue;
                shuffled = temp; break;
            }
        }
        if (!shuffled) { alert('فشل السحب، جرب مرة أخرى'); btn.innerText = '🎲 ابدأ القرعة الآن'; return; }
        
        await db.from('assignments').delete().neq('id', 0);
        await db.from('draws').insert({ month_name: 'عيد الفطر' });
        const { data: newDraw } = await db.from('draws').select('id').order('created_at', {ascending:false}).limit(1).single();
        const inserts = members.map((m, idx) => ({ draw_id: newDraw.id, giver_id: m.id, receiver_id: shuffled[idx].id }));
        await db.from('assignments').insert(inserts);
        doHaptic([100, 100, 100]);
        location.reload();
    }
</script>

</body>
</html>
