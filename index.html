<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هدايا العيد! 🎁</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <link rel="manifest" id="manifest-link">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #090a0f;
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 0, 0, 0.3);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f8fafc;
                --text-main: #0f172a;
                --text-sub: #64748b;
                --glass: rgba(255, 255, 255, 0.9);
                --glass-border: rgba(99, 102, 241, 0.15);
                --input-bg: #ffffff;
            }
        }

        body { background: var(--bg); color: var(--text-main); min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; transition: background 0.3s; }

        .glass { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff !important; transition: all 0.2s; border: none; }
        .btn-primary:active { transform: scale(0.92); }

        input { background: var(--input-bg) !important; color: var(--text-main) !important; border: 1px solid var(--glass-border) !important; outline: none; }
        
        .fade-in { animation: fade 0.5s ease-out; }
        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .wish-btn { background: rgba(99, 102, 241, 0.05); color: var(--text-main); border: 1px solid var(--glass-border); }
        .wish-active { background: #6366f1 !important; color: #fff !important; }
    </style>
</head>
<body>

<div id="login-screen" class="max-w-sm w-full fade-in px-6 mt-20">
    <div class="text-center mb-10">
        <span class="text-7xl">🎁</span>
        <h1 class="text-3xl font-black mt-4">هدايا العيد</h1>
        <p class="mt-2 opacity-70">أدخل الرمز السري</p>
    </div>
    <div class="glass rounded-3xl p-6 flex flex-col gap-4">
        <input type="password" id="access-code" placeholder="الرمز السري" class="text-center p-4 rounded-2xl font-bold text-2xl">
        <button onclick="login()" id="login-btn" class="btn-primary w-full font-black py-4 rounded-2xl text-lg shadow-xl shadow-indigo-500/20">
            تسجيل الدخول
        </button>
    </div>
</div>

<div id="member-screen" class="fade-in w-full max-w-sm px-4 hidden flex-col gap-6 py-10">
    <div class="glass rounded-3xl p-8 text-center shadow-xl">
        <p class="text-sm opacity-60">أهلاً وسهلاً</p>
        <h2 id="user-welcome" class="text-2xl font-black mb-6"></h2>

        <div id="result-card" class="p-6 rounded-2xl border border-indigo-500/20 bg-indigo-500/5 hidden">
            <p class="text-xs opacity-60 mb-1">🎯 ستُهدي هذا العيد</p>
            <div id="target-name" class="text-4xl font-black text-indigo-500 mb-6 tracking-tight"></div>
            
            <div class="bg-indigo-500/10 p-3 rounded-2xl mb-6 flex items-center justify-center gap-2 border border-indigo-500/10">
                <span id="countdown-timer" class="text-sm font-bold">...</span>
            </div>

            <button onclick="toggleWishes()" class="w-full bg-white/5 border border-white/10 py-2 rounded-xl text-xs font-bold mb-4">🎁 رغبات الشخص</button>
            <div id="wishes-box" class="hidden flex-wrap justify-center gap-2 mb-4"></div>

            <div class="pt-4 border-t border-indigo-500/10">
                <button id="deliver-btn" onclick="markAsDelivered()" class="btn-primary w-full py-3 rounded-2xl font-black text-sm">📦 تأكيد التسليم</button>
                <div id="delivered-msg" class="hidden text-green-500 font-bold">✅ تم التسليم بنجاح!</div>
            </div>
        </div>
        
        <div id="no-draw-msg" class="hidden py-10 opacity-50 font-bold">لم تُجرَ القرعة بعد ⏳</div>
    </div>

    <div class="glass rounded-3xl p-6">
        <h3 class="font-black mb-4">🌟 رغباتي</h3>
        <div id="wishes-grid" class="grid grid-cols-2 gap-2 mb-4"></div>
        <button onclick="saveWishes()" id="save-wishes-btn" class="w-full py-3 rounded-xl font-bold border border-indigo-500/30 text-sm">💾 حفظ</button>
    </div>

    <button onclick="location.reload()" class="opacity-40 font-bold text-sm">← تسجيل خروج</button>
</div>

<div id="admin-screen" class="w-full max-w-sm px-4 fade-in hidden flex-col gap-4 mt-10">
    <div class="glass rounded-3xl p-6 text-center">
        <h2 class="text-xl font-black">المشرف 👑</h2>
        <button onclick="runDraw()" id="draw-btn" class="btn-primary w-full py-4 rounded-2xl font-black mt-6">🎲 إجراء القرعة</button>
        <div id="assignments-list" class="mt-6 flex flex-col gap-2"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://oprethkloexyrhagmdod.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wcmV0aGtsb2V4eXJoYWdtZG9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTI1MjAsImV4cCI6MjA4ODM4ODUyMH0.crUKNWb8iWJHwe9mp59KcALS4LSuy0dqZn4xEsW04Gc';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentAssignmentId = null;

    // دالة الاهتزاز - تعمل فقط بعد تفاعل المستخدم
    function haptic(pattern) {
        if ("vibrate" in navigator) {
            try { navigator.vibrate(pattern); } catch (e) { console.log(e); }
        }
    }

    async function login() {
        // أهم خطوة لآيفون: نهز الجهاز فور اللمس لتفعيل الصلاحية
        haptic(50);

        const btn = document.getElementById('login-btn');
        const code = document.getElementById('access-code').value.trim();
        if (!code) return;

        btn.innerText = 'جاري التحقق...';
        btn.disabled = true;

        const { data: user, error } = await db.from('users').select('*').eq('code', code).single();

        if (error || !user) {
            alert('خطأ في الرمز!');
            btn.innerText = 'تسجيل الدخول';
            btn.disabled = false;
            return;
        }

        currentUser = user;
        user.role === 'admin' ? showAdminScreen() : showMemberScreen(user);
    }

    async function showMemberScreen(user) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('member-screen').classList.remove('hidden');
        document.getElementById('member-screen').style.display = 'flex';
        document.getElementById('user-welcome').innerText = user.name;

        buildWishesGrid(user.wishes || '');

        const { data: assign } = await db.from('assignments').select('*, receiver:users!receiver_id(name, wishes)').eq('giver_id', user.id).limit(1).maybeSingle();

        if (assign) {
            currentAssignmentId = assign.id;
            document.getElementById('target-name').innerText = assign.receiver.name;
            
            // اهتزاز عند ظهور الاسم
            setTimeout(() => haptic([100, 50, 100]), 500);

            if (assign.is_delivered) {
                document.getElementById('delivered-msg').classList.remove('hidden');
                document.getElementById('deliver-btn').classList.add('hidden');
            } else {
                document.getElementById('deliver-btn').classList.remove('hidden');
            }
            document.getElementById('result-card').classList.remove('hidden');
            window.receiverWishesData = (assign.receiver.wishes || '').split(',').filter(Boolean);
        } else {
            document.getElementById('no-draw-msg').classList.remove('hidden');
        }
    }

    function initCountdown() {
        const eid = new Date("2026-03-20T00:00:00").getTime();
        setInterval(() => {
            const diff = eid - new Date().getTime();
            if (diff < 0) { document.getElementById('countdown-timer').innerText = "عيد مبارك!"; return; }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('countdown-timer').innerText = `باقي للعيد: ${d} يوم و ${h} ساعة`;
        }, 1000);
    }
    initCountdown();

    function buildWishesGrid(saved) {
        const options = ['عطور', 'ملابس', 'إلكترونيات', 'قهوة', 'ساعة', 'كتاب'];
        const grid = document.getElementById('wishes-grid');
        const savedArray = (saved || '').split(',');
        grid.innerHTML = options.map(opt => `
            <button onclick="toggleWish(this)" class="wish-btn p-3 rounded-xl text-xs font-bold ${savedArray.includes(opt) ? 'wish-active' : ''}">${opt}</button>
        `).join('');
    }

    function toggleWish(btn) {
        btn.classList.toggle('wish-active');
        haptic(30);
    }

    async function saveWishes() {
        haptic(50);
        const selected = [...document.querySelectorAll('.wish-active')].map(b => b.innerText);
        await db.from('users').update({ wishes: selected.join(',') }).eq('id', currentUser.id);
        alert('تم الحفظ!');
    }

    function toggleWishes() {
        haptic(20);
        const box = document.getElementById('wishes-box');
        box.classList.toggle('hidden');
        box.classList.add('flex');
        const data = window.receiverWishesData || [];
        box.innerHTML = data.length ? data.map(w => `<span class="bg-indigo-500/20 px-3 py-1 rounded-lg text-xs font-bold">${w}</span>`).join('') : 'لم يحدد رغباته';
    }

    async function markAsDelivered() {
        if(!confirm('تأكيد التسليم؟')) return;
        haptic([50, 50, 50]);
        await db.from('assignments').update({ is_delivered: true }).eq('id', currentAssignmentId);
        location.reload();
    }

    function showAdminScreen() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin-screen').classList.remove('hidden');
        document.getElementById('admin-screen').style.display = 'flex';
    }

    async function runDraw() {
        haptic(100);
        const { data: members } = await db.from('users').select('*').eq('role', 'member');
        let shuffled = null;
        for (let i = 0; i < 1000; i++) {
            const temp = [...members].sort(() => Math.random() - 0.5);
            if (!temp.some((m, idx) => m.id === members[idx].id)) {
                const map = {}; members.forEach((m, idx) => map[m.name] = temp[idx].name);
                if (map['فواز'] === 'نواف') continue;
                const giverOfS = Object.keys(map).find(k => map[k] === 'سميرة');
                if (!['طارق', 'فواز'].includes(giverOfS)) continue;
                shuffled = temp; break;
            }
        }
        if (!shuffled) return alert('فشل السحب');
        await db.from('assignments').delete().neq('id', 0);
        const { data: d } = await db.from('draws').insert({ month_name: 'العيد' }).select().single();
        const inserts = members.map((m, idx) => ({ draw_id: d.id, giver_id: m.id, receiver_id: shuffled[idx].id }));
        await db.from('assignments').insert(inserts);
        alert('تمت القرعة!');
        location.reload();
    }
</script>

</body>
</html>
